  <title>weiword</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #1a1512; }
    .bg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      object-fit: cover;
      object-position: center;
      display: block;
      z-index: 0;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: transparent;
    }
    .wordmark {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      -webkit-text-stroke: 1px #000;
      paint-order: stroke fill;
      letter-spacing: 0.2px;
      line-height: 1;
      user-select: none;
    }
    .connect-btn {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #000;
      background: #fff;
      border: 1px solid #000;
      border-radius: 7px;
      padding: 7px 16px;
      cursor: pointer;
      line-height: 1;
      min-width: 92px;
    }
    .connect-btn:hover { background: #f0f0f0; }
    .connect-btn:focus-visible { outline: 2px solid #000; outline-offset: 2px; }
    .connect-btn:disabled { opacity: 0.7; cursor: default; }
  </style>

  <header>
    <span class="wordmark">weiword</span>
    <button class="connect-btn" id="connectBtn" type="button">Connect</button>
  </header>

  <script type="module">
    // ====================================================================
    // Wallet connect (Reown AppKit, formerly WalletConnect Web3Modal)
    // 1. Get a FREE project ID at https://dashboard.reown.com
    // 2. Paste it below, replacing YOUR_REOWN_PROJECT_ID
    // 3. Serve this page over http(s) (a host or local server) — wallet
    //    connections don't work when opening the file directly (file://).
    // ====================================================================
    const projectId = '03ee703072575aaa644029ad2ccf77d2';

    const APPKIT_VERSION = '1.8.21';
    const btn = document.getElementById('connectBtn');
    let modal = null;
    let busy = false;

    async function getModal() {
      if (modal) return modal;
      const base = 'https://esm.sh/@reown/appkit@' + APPKIT_VERSION;
      const [core, ethers, nets] = await Promise.all([
        import(base),
        import('https://esm.sh/@reown/appkit-adapter-ethers@' + APPKIT_VERSION + '?deps=@reown/appkit@' + APPKIT_VERSION),
        import(base + '/networks')
      ]);
      modal = core.createAppKit({
        adapters: [new ethers.EthersAdapter()],
        networks: [nets.mainnet, nets.arbitrum, nets.base, nets.polygon],
        projectId,
        metadata: {
          name: 'weiword',
          description: 'weiword',
          url: window.location.origin,
          icons: []
        },
        features: { analytics: false }
      });
      // Reflect connection state in the button label
      try {
        modal.subscribeAccount((state) => {
          if (state && state.isConnected && state.address) {
            const a = state.address;
            btn.textContent = a.slice(0, 6) + '\u2026' + a.slice(-4);
          } else {
            btn.textContent = 'Connect';
          }
        });
      } catch (e) { /* non-fatal */ }
      return modal;
    }

    btn.addEventListener('click', async () => {
      if (!projectId || projectId === 'YOUR_REOWN_PROJECT_ID') {
        alert('To enable wallet connect, add your free Reown project ID in index.html.\nGet one at https://dashboard.reown.com');
        return;
      }
      if (busy) return;
      busy = true;
      btn.disabled = true;
      const prev = btn.textContent;
      btn.textContent = 'Loading\u2026';
      try {
        const m = await getModal();
        await m.open();
      } catch (err) {
        console.error(err);
        alert('Could not load the wallet connector. Check your connection and make sure the page is served over http(s).');
      } finally {
        if (btn.textContent === 'Loading\u2026') btn.textContent = prev;
        btn.disabled = false;
        busy = false;
      }
    });
  </script>
